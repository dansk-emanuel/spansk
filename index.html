<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoRecall - Active Recall App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-transition { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">
    <div id="root"></div>

    <!-- Firebase & React setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, addDoc, collection, onSnapshot, query, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import React, { useState, useEffect } from "https://esm.sh/react@18.2.0";
        import ReactDOM from "https://esm.sh/react-dom@18.2.0/client";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lingo-recall-pro';
        const apiKey = ""; // Gemini API Key via environment

        // --- UI Komponenter ---
        const Icon = ({ name, size = 24 }) => {
            const icons = {
                plus: '<path d="M5 12h14m-7-7v14"/>',
                book: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20M4 19.5V5a2.5 2.5 0 0 1 2.5-2.5H20v14"/>',
                card: '<rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/>',
                volume: '<path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>',
                trash: '<path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>',
                send: '<path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>'
            };
            return React.createElement('svg', {
                width: size,
                height: size,
                viewBox: "0 0 24 24",
                fill: "none",
                stroke: "currentColor",
                strokeWidth: "2",
                strokeLinecap: "round",
                strokeLinejoin: "round",
                dangerouslySetInnerHTML: { __html: icons[name] }
            });
        };

        // --- Hoved App ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [step, setStep] = useState('welcome');
            const [sourceLang, setSourceLang] = useState('');
            const [sentences, setSentences] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);

            useEffect(() => {
                signInAnonymously(auth);
                onAuthStateChanged(auth, (u) => {
                    if (u) {
                        setUser(u);
                        // Hent brugerens indstillinger (sprogvalg)
                        const configRef = doc(db, 'artifacts', appId, 'users', u.uid, 'settings', 'config');
                        getDoc(configRef).then(snap => {
                            if (snap.exists()) {
                                setSourceLang(snap.data().sourceLang);
                                setStep('input');
                            }
                        });
                        // Lyt på sætninger
                        const q = collection(db, 'artifacts', appId, 'users', u.uid, 'sentences');
                        onSnapshot(q, (snapshot) => {
                            const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                            setSentences(data.sort((a, b) => b.createdAt - a.createdAt));
                        });
                    }
                });
            }, []);

            const handleTranslate = async (e) => {
                e.preventDefault();
                if (!inputValue.trim() || isProcessing) return;
                setIsProcessing(true);
                const text = inputValue;
                setInputValue('');

                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Translate "${text}" from ${sourceLang} to Danish. Return ONLY the translation.` }] }]
                        })
                    });
                    const res = await resp.json();
                    const danish = res.candidates[0].content.parts[0].text.trim();
                    
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'sentences'), {
                        original: text,
                        danish: danish,
                        createdAt: Date.now()
                    });
                } catch (err) { console.error(err); }
                setIsProcessing(false);
            };

            const playAudio = async (text) => {
                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Sig dette på dansk: ${text}` }] }],
                            generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } },
                            model: "gemini-2.5-flash-preview-tts"
                        })
                    });
                    const res = await resp.json();
                    const base64 = res.candidates[0].content.parts[0].inlineData.data;
                    
                    // WAV Header creation for browser playback
                    const audioBlob = createWavBlob(base64);
                    const url = URL.createObjectURL(audioBlob);
                    const audio = new Audio(url);
                    audio.play();
                } catch (e) { console.error(e); }
            };

            const createWavBlob = (base64) => {
                const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
                const buffer = new ArrayBuffer(44 + bytes.length);
                const view = new DataView(buffer);
                const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
                writeStr(0, 'RIFF'); view.setUint32(4, 36 + bytes.length, true);
                writeStr(8, 'WAVE'); writeStr(12, 'fmt '); view.setUint32(16, 16, true);
                view.setUint16(20, 1, true); view.setUint16(22, 1, true);
                view.setUint32(24, 24000, true); view.setUint32(28, 48000, true);
                view.setUint16(32, 2, true); view.setUint16(34, 16, true);
                writeStr(36, 'data'); view.setUint32(40, bytes.length, true);
                new Uint8Array(buffer, 44).set(bytes);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            if (!user) return React.createElement('div', { className: 'h-screen flex items-center justify-center' }, 'Henter profil...');

            return React.createElement('div', { className: 'max-w-md mx-auto min-h-screen flex flex-col' },
                step !== 'welcome' && React.createElement('nav', { className: 'bg-white border-b p-4 sticky top-0 z-50 flex justify-around shadow-sm' },
                    ['input', 'review', 'flashcards'].map(s => React.createElement('button', {
                        key: s,
                        onClick: () => setStep(s),
                        className: `flex flex-col items-center gap-1 ${step === s ? 'text-blue-600' : 'text-slate-400'}`
                    }, React.createElement(Icon, { name: s === 'input' ? 'plus' : s === 'review' ? 'book' : 'card' })))
                ),
                React.createElement('main', { className: 'p-5 flex-1' },
                    step === 'welcome' && React.createElement('div', { className: 'pt-10 space-y-6 text-center animate-fade-in' },
                        React.createElement('h1', { className: 'text-3xl font-black' }, 'LingoRecall'),
                        React.createElement('p', { className: 'text-slate-500' }, 'Vælg dit modersmål:'),
                        React.createElement('div', { className: 'grid gap-2 text-left h-[60vh] overflow-y-auto pr-2' },
                            ["English", "Spanish", "French", "German", "Arabic", "Hindi", "Russian", "Japanese", "Turkish", "Vietnamese", "Portuguese", "Italian", "Polish", "Ukrainian", "Persian", "Urdu", "Dutch", "Greek", "Swedish", "Thai"].map(l => 
                                React.createElement('button', {
                                    key: l,
                                    onClick: () => {
                                        setSourceLang(l); setStep('input');
                                        setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'config'), { sourceLang: l });
                                    },
                                    className: 'p-4 bg-white border border-slate-200 rounded-xl hover:bg-blue-50 font-medium'
                                }, l)
                            )
                        )
                    ),
                    step === 'input' && React.createElement('div', { className: 'space-y-6 animate-fade-in' },
                        React.createElement('header', null, React.createElement('h2', { className: 'text-2xl font-bold' }, 'Tilføj Sætninger'), React.createElement('p', { className: 'text-slate-400 text-sm' }, 'Modersmål: ' + sourceLang)),
                        React.createElement('form', { onSubmit: handleTranslate, className: 'relative' },
                            React.createElement('input', {
                                value: inputValue,
                                onChange: e => setInputValue(e.target.value),
                                placeholder: 'Skriv en sætning...',
                                className: 'w-full p-5 pr-14 bg-white rounded-2xl border-2 border-slate-100 shadow-sm focus:border-blue-500 outline-none text-lg',
                                disabled: isProcessing
                            }),
                            React.createElement('button', {
                                type: 'submit',
                                className: 'absolute right-3 top-3 bottom-3 w-10 bg-blue-600 text-white rounded-xl flex items-center justify-center'
                            }, isProcessing ? '...' : React.createElement(Icon, { name: 'send', size: 18 }))
                        ),
                        React.createElement('div', { className: 'bg-white rounded-2xl border overflow-hidden' },
                            sentences.map(s => React.createElement('div', { key: s.id, className: 'p-4 border-b flex justify-between items-center' },
                                React.createElement('div', { className: 'truncate pr-4' }, 
                                    React.createElement('p', { className: 'font-medium truncate' }, s.original),
                                    React.createElement('p', { className: 'text-blue-600 text-xs italic' }, s.danish)
                                ),
                                React.createElement('button', { onClick: () => deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'sentences', s.id)), className: 'text-slate-300' }, React.createElement(Icon, { name: 'trash', size: 16 }))
                            ))
                        )
                    ),
                    step === 'review' && React.createElement('div', { className: 'space-y-4 animate-fade-in' },
                        React.createElement('h2', { className: 'text-2xl font-bold mb-4' }, 'Gennemse'),
                        sentences.map(s => React.createElement('div', { key: s.id, className: 'bg-white p-5 rounded-2xl border flex items-center justify-between shadow-sm' },
                            React.createElement('div', null,
                                React.createElement('p', { className: 'text-xs text-slate-400 font-bold uppercase' }, sourceLang),
                                React.createElement('p', { className: 'mb-2' }, s.original),
                                React.createElement('p', { className: 'text-xs text-blue-500 font-bold uppercase' }, 'Dansk'),
                                React.createElement('p', { className: 'text-lg font-bold' }, s.danish)
                            ),
                            React.createElement('button', { onClick: () => playAudio(s.danish), className: 'w-12 h-12 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center' }, React.createElement(Icon, { name: 'volume' }))
                        ))
                    ),
                    step === 'flashcards' && React.createElement(Flashcards, { sentences, playAudio, sourceLang })
                )
            );
        };

        const Flashcards = ({ sentences, playAudio, sourceLang }) => {
            const [stack, setStack] = useState([...sentences]);
            const [idx, setIdx] = useState(0);
            const [flipped, setFlipped] = useState(false);
            const [done, setDone] = useState(false);

            if (sentences.length === 0) return React.createElement('div', { className: 'text-center py-20 text-slate-400' }, 'Ingen sætninger endnu.');
            if (done) return React.createElement('div', { className: 'text-center py-10 space-y-6' }, 
                React.createElement('h2', { className: 'text-2xl font-bold' }, 'Færdig!'),
                React.createElement('button', { onClick: () => { setStack([...sentences]); setIdx(0); setDone(false); setFlipped(false); }, className: 'p-4 bg-blue-600 text-white rounded-xl w-full font-bold' }, 'Øv igen')
            );

            const curr = stack[idx];
            const next = (correct) => {
                if (correct) {
                    if (idx + 1 >= stack.length) setDone(true);
                    else { setIdx(idx + 1); setFlipped(false); }
                } else {
                    const s = [...stack];
                    const item = s.splice(idx, 1)[0];
                    s.push(item);
                    setStack(s);
                    setFlipped(false);
                }
            };

            return React.createElement('div', { className: 'space-y-8 animate-fade-in' },
                React.createElement('div', { className: 'flex justify-between text-xs font-bold text-slate-400 uppercase' }, 
                    React.createElement('span', null, 'Træning'), React.createElement('span', null, `${idx + 1} / ${stack.length}`)
                ),
                React.createElement('div', { 
                    className: 'relative h-80 w-full perspective-1000 cursor-pointer',
                    onClick: () => setFlipped(!flipped)
                },
                    React.createElement('div', { className: `relative w-full h-full card-transition preserve-3d ${flipped ? 'rotate-y-180' : ''}` },
                        React.createElement('div', { className: 'absolute inset-0 backface-hidden bg-white rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 text-center border' },
                            React.createElement('p', { className: 'text-xs text-blue-400 font-bold mb-4 uppercase' }, sourceLang),
                            React.createElement('p', { className: 'text-xl font-medium' }, curr.original)
                        ),
                        React.createElement('div', { className: 'absolute inset-0 backface-hidden rotate-y-180 bg-blue-600 rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 text-center text-white' },
                            React.createElement('p', { className: 'text-xs text-blue-200 font-bold mb-4 uppercase' }, 'Dansk'),
                            React.createElement('p', { className: 'text-2xl font-bold mb-6' }, curr.danish),
                            React.createElement('button', { onClick: (e) => { e.stopPropagation(); playAudio(curr.danish); }, className: 'w-12 h-12 bg-white/20 rounded-full flex items-center justify-center' }, React.createElement(Icon, { name: 'volume' }))
                        )
                    )
                ),
                React.createElement('div', { className: 'grid grid-cols-2 gap-4' },
                    React.createElement('button', { onClick: () => next(false), className: 'p-4 bg-white border text-red-500 rounded-xl font-bold' }, 'Svært'),
                    React.createElement('button', { onClick: () => next(true), className: 'p-4 bg-white border text-green-600 rounded-xl font-bold' }, 'Rigtigt')
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
