<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Islands - Spreadsheet Edition</title>
    <!-- Biblioteker via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .blur-sm { filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // INDSÆT DIN API NØGLE HER
        const API_KEY = ""; 

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} class={`${className}`}></i>;
        };

        const App = () => {
            const [islands, setIslands] = useState(() => {
                const saved = localStorage.getItem('language_islands_data');
                return saved ? JSON.parse(saved) : {};
            });
            const [currentIsland, setCurrentIsland] = useState(null);
            const [newIslandName, setNewIslandName] = useState('');
            const [inputText, setInputText] = useState('');
            const [isTranslating, setIsTranslating] = useState(false);
            const [hideSpanishAll, setHideSpanishAll] = useState(false);
            const [revealedIds, setRevealedIds] = useState([]);

            useEffect(() => {
                localStorage.setItem('language_islands_data', JSON.stringify(islands));
                if (window.lucide) window.lucide.createIcons();
            }, [islands, currentIsland]);

            const addIsland = () => {
                const trimmed = newIslandName.trim();
                if (!trimmed || islands[trimmed]) return;
                setIslands(prev => ({ ...prev, [trimmed]: [] }));
                setNewIslandName('');
            };

            const deleteIsland = (name, e) => {
                e.stopPropagation();
                const newIslands = { ...islands };
                delete newIslands[name];
                setIslands(newIslands);
                if (currentIsland === name) setCurrentIsland(null);
            };

            const processAndAddSentences = async (text) => {
                if (!text.trim()) return;
                setIsTranslating(true);

                try {
                    const prompt = `Take the following text and split it into individual logical sentences. Then translate each sentence to Spanish. Return ONLY a JSON array: [{"da": "dansk", "es": "spansk"}]. Text: "${text}"`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const data = await response.json();
                    const results = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text || "[]");

                    const newEntries = results.map(item => ({
                        id: Date.now() + Math.random(),
                        danish: item.da,
                        spanish: item.es
                    }));

                    setIslands(prev => ({
                        ...prev,
                        [currentIsland]: [...(prev[currentIsland] || []), ...newEntries]
                    }));
                } catch (error) {
                    console.error("Fejl:", error);
                } finally {
                    setIsTranslating(false);
                    setInputText('');
                }
            };

            const toggleReveal = (id) => {
                setRevealedIds(prev => prev.includes(id) ? prev.filter(rid => rid !== id) : [...prev, id]);
            };

            const deleteSentence = (id) => {
                setIslands(prev => ({
                    ...prev,
                    [currentIsland]: prev[currentIsland].filter(s => s.id !== id)
                }));
            };

            if (currentIsland) {
                const sentences = islands[currentIsland] || [];
                return (
                    <div className="min-h-screen bg-white flex flex-col">
                        <header className="bg-slate-900 text-white px-4 py-3 flex items-center justify-between sticky top-0 z-30">
                            <div className="flex items-center gap-2">
                                <button onClick={() => setCurrentIsland(null)} className="p-1 hover:bg-slate-800 rounded">
                                    <Icon name="chevron-left" className="w-5 h-5" />
                                </button>
                                <span className="font-bold text-xs uppercase tracking-widest">{currentIsland}</span>
                            </div>
                            <button 
                                onClick={() => { setHideSpanishAll(!hideSpanishAll); setRevealedIds([]); }}
                                className={`flex items-center gap-2 px-3 py-1.5 rounded text-[10px] font-black transition-all ${hideSpanishAll ? 'bg-amber-500 text-slate-900' : 'bg-slate-700 text-slate-300 border border-slate-600'}`}
                            >
                                <Icon name={hideSpanishAll ? "eye-off" : "eye"} className="w-3.5 h-3.5" />
                                {hideSpanishAll ? 'SKJULER SPANSK' : 'VISER ALT'}
                            </button>
                        </header>

                        <div className="bg-slate-100 border-b border-slate-200 p-2 sticky top-[48px] z-20">
                            <div className="max-w-7xl mx-auto flex gap-2">
                                <input 
                                    type="text" 
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                    placeholder="Skriv dansk sætning her..."
                                    className="flex-1 border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none"
                                    onKeyPress={(e) => e.key === 'Enter' && processAndAddSentences(inputText)}
                                />
                                <button 
                                    disabled={isTranslating || !inputText.trim()}
                                    onClick={() => processAndAddSentences(inputText)}
                                    className="bg-indigo-600 text-white px-6 py-2 rounded text-xs font-bold disabled:opacity-50 flex items-center gap-2 shrink-0"
                                >
                                    {isTranslating ? <Icon name="loader-2" className="w-4 h-4 animate-spin" /> : <Icon name="plus" className="w-4 h-4" />}
                                    TILFØJ
                                </button>
                            </div>
                        </div>

                        <main className="flex-1 overflow-x-auto">
                            <table className="w-full border-collapse table-fixed">
                                <thead className="bg-slate-50 text-[10px] text-slate-500 font-bold uppercase tracking-widest sticky top-0 shadow-sm">
                                    <tr>
                                        <th className="px-4 py-2 border-b border-r border-slate-200 w-10 text-center">#</th>
                                        <th className="px-4 py-2 border-b border-r border-slate-200 text-left w-[calc(50%-45px)]">Dansk</th>
                                        <th className="px-4 py-2 border-b border-r border-slate-200 text-left w-[calc(50%-45px)]">Spansk</th>
                                        <th className="px-4 py-2 border-b border-slate-200 w-10 text-center"></th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {sentences.map((s, index) => (
                                        <tr key={s.id} className="hover:bg-slate-50 group">
                                            <td className="px-2 py-3 text-[10px] text-slate-400 font-mono text-center border-r border-slate-100">{index + 1}</td>
                                            <td className="px-4 py-3 text-sm text-slate-800 border-r border-slate-100 align-top break-words">{s.danish}</td>
                                            <td className="px-4 py-3 border-r border-slate-100 align-top break-words">
                                                <div className="flex items-start justify-between gap-2">
                                                    <span className={`text-sm font-bold transition-all ${
                                                        hideSpanishAll && !revealedIds.includes(s.id) 
                                                        ? 'text-transparent select-none blur-sm bg-slate-100 rounded px-1' 
                                                        : 'text-indigo-700'
                                                    }`}>
                                                        {s.spanish}
                                                    </span>
                                                    {hideSpanishAll && (
                                                        <button onClick={() => toggleReveal(s.id)} className="shrink-0 text-slate-300 hover:text-indigo-600">
                                                            <Icon name={revealedIds.includes(s.id) ? "eye-off" : "eye"} className="w-4 h-4" />
                                                        </button>
                                                    )}
                                                </div>
                                            </td>
                                            <td className="px-2 py-3 text-center">
                                                <button onClick={() => deleteSentence(s.id)} className="text-slate-200 hover:text-red-500">
                                                    <Icon name="trash-2" className="w-4 h-4" />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </main>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50">
                    <header className="bg-slate-900 text-white p-8 rounded-b-[2rem] shadow-lg">
                        <div className="max-w-5xl mx-auto">
                            <h1 className="text-2xl font-black tracking-tighter flex items-center gap-2 uppercase">
                                <Icon name="globe" className="w-6 h-6 text-amber-500" />
                                Language Islands
                            </h1>
                            <p className="text-slate-500 text-[10px] font-bold mt-1 tracking-widest uppercase">Spreadsheet Edition</p>
                        </div>
                    </header>

                    <main className="p-4 max-w-5xl mx-auto -mt-6">
                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3">
                            {Object.keys(islands).map((name) => (
                                <div 
                                    key={name}
                                    onClick={() => setCurrentIsland(name)}
                                    className="bg-white rounded-xl p-4 shadow-sm border border-slate-200 cursor-pointer hover:border-indigo-500 transition-all group relative overflow-hidden"
                                >
                                    <div className="absolute top-0 left-0 w-1 h-full bg-slate-200 group-hover:bg-indigo-600" />
                                    <div className="flex justify-between items-start mb-2">
                                        <span className="text-[10px] font-bold text-slate-400 uppercase">{islands[name].length} rækker</span>
                                        <button onClick={(e) => deleteIsland(name, e)} className="text-slate-200 hover:text-red-500">
                                            <Icon name="trash-2" className="w-3.5 h-3.5" />
                                        </button>
                                    </div>
                                    <h3 className="font-bold text-xs text-slate-800 uppercase truncate">{name}</h3>
                                </div>
                            ))}
                            
                            <div className="bg-slate-50 border border-dashed border-slate-300 rounded-xl p-4 flex flex-col gap-2">
                                <input 
                                    type="text" 
                                    value={newIslandName}
                                    onChange={(e) => setNewIslandName(e.target.value)}
                                    placeholder="NY Ø..."
                                    className="w-full bg-transparent border-b border-slate-300 focus:border-indigo-600 focus:outline-none text-center font-bold text-[10px] text-slate-600 uppercase"
                                    onKeyPress={(e) => e.key === 'Enter' && addIsland()}
                                />
                                <button onClick={addIsland} className="w-full bg-slate-800 text-white py-1.5 rounded text-[10px] font-bold uppercase">OPRET</button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
