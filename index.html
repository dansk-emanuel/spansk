<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spansk Træner v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans p-4">

    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl overflow-hidden mt-6">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">Spansk Træner</h1>
            <p class="opacity-80">Tryk, tal dansk, lær spansk</p>
        </div>

        <div class="p-6 space-y-6">
            <!-- Knappen -->
            <div class="flex flex-col items-center justify-center space-y-4">
                <button id="startBtn" class="w-24 h-24 bg-red-500 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                    <span id="micIcon" class="text-white text-3xl">🎤</span>
                </button>
                <p id="status" class="text-slate-500 font-medium">Tryk for at tale</p>
            </div>

            <!-- Resultat felt -->
            <div id="resultArea" class="hidden space-y-4 p-4 bg-slate-50 rounded-xl border border-slate-200">
                <div>
                    <p class="text-xs text-slate-400 uppercase font-bold">Du sagde:</p>
                    <p id="danishText" class="text-lg text-slate-800"></p>
                </div>
                <div class="pt-2 border-t border-slate-200">
                    <p class="text-xs text-blue-400 uppercase font-bold">Spansk:</p>
                    <p id="spanishText" class="text-xl text-blue-700 font-bold italic"></p>
                </div>
                <button onclick="playSpanish()" class="w-full py-2 bg-blue-100 text-blue-700 rounded-lg font-bold">Hør udtale 🔊</button>
            </div>
        </div>

        <!-- Indstillinger -->
        <div class="p-4 bg-slate-50 text-center border-t border-slate-100">
            <button onclick="setupKey()" class="text-xs text-slate-400 underline">Indstil API Nøgle</button>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        const resultArea = document.getElementById('resultArea');
        
        // Tale-til-tekst setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if (recognition) {
            recognition.lang = 'da-DK';
            recognition.continuous = false;
        }

        startBtn.onclick = () => {
            if (!recognition) return alert("Din browser understøtter ikke diktering.");
            if (!localStorage.getItem('gemini_api_key')) return setupKey();
            
            recognition.start();
            status.innerText = "Lytter...";
            startBtn.classList.add('animate-pulse', 'bg-red-600');
        };

        if (recognition) {
            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('danishText').innerText = transcript;
                status.innerText = "Oversætter...";
                await translate(transcript);
            };

            recognition.onend = () => {
                startBtn.classList.remove('animate-pulse', 'bg-red-600');
                if (status.innerText === "Lytter...") status.innerText = "Prøv igen";
            };
        }

        async function translate(text) {
            const key = localStorage.getItem('gemini_api_key');
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Oversæt kort og præcist til spansk: "${text}". Svar kun med oversættelsen.` }] }]
                    })
                });

                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text;
                
                document.getElementById('spanishText').innerText = result;
                resultArea.classList.remove('hidden');
                status.innerText = "Færdig!";
                playSpanish();
            } catch (err) {
                alert("Fejl i API nøgle. Prøv at indstille den igen.");
                setupKey();
            }
        }

        function playSpanish() {
            const text = document.getElementById('spanishText').innerText;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'es-ES';
            window.speechSynthesis.speak(utter);
        }

        function setupKey() {
            const key = prompt("Indtast din Gemini API-nøgle:");
            if (key) {
                localStorage.setItem('gemini_api_key', key.trim());
                location.reload();
            }
        }
    </script>
</body>
</html>
